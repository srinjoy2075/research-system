services:
  # Python FastAPI Backend
  - type: web
    name: research-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

staticSites:
  # React Frontend (Static Site)
  - name: research-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
        placeholder: "Enter the deployed backend URL (e.g., https://research-backend.onrender.com)"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
